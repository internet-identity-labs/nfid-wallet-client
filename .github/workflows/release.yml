name: Deployment

on:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.NFID_FRONTEND_E2E_REPORT_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.NFID_FRONTEND_E2E_REPORT_AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  S3_BUCKET: nfid-wallet-client-e2e-report
  S3_PREFIX: secrets-backup

jobs:
  backup-repo-secrets:
    name: Backup Repository Secrets & Variables
    runs-on: ubuntu-latest
    steps:
      - name: Dump and upload repo secrets and variables
        env:
          # Repository secrets — ACTIVE
          PAT: ${{ secrets.PAT }}
          LAMBDA_IDENTITY: ${{ secrets.LAMBDA_IDENTITY }}
          NFID_FRONTEND_E2E_REPORT_AWS_ACCESS_KEY_ID: ${{ secrets.NFID_FRONTEND_E2E_REPORT_AWS_ACCESS_KEY_ID }}
          NFID_FRONTEND_E2E_REPORT_AWS_SECRET_ACCESS_KEY: ${{ secrets.NFID_FRONTEND_E2E_REPORT_AWS_SECRET_ACCESS_KEY }}
          USER_DATA_DIR: ${{ secrets.USER_DATA_DIR }}
          # Repository secrets — UNUSED
          DEV_ADMIN_KEY: ${{ secrets.DEV_ADMIN_KEY }}
          DFX_NETWORK: ${{ secrets.DFX_NETWORK }}
          GH_MP_ADMIN_PEM: ${{ secrets.GH_MP_ADMIN_PEM }}
          GH_NPM_READ_TOKEN: ${{ secrets.GH_NPM_READ_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NEXT_PUBLIC_IC_HOST: ${{ secrets.NEXT_PUBLIC_IC_HOST }}
          NPM_GH_TOKEN: ${{ secrets.NPM_GH_TOKEN }}
          PROD_ADMIN_KEY: ${{ secrets.PROD_ADMIN_KEY }}
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
          CYCLES_MINTER_CANISTER_ID: ${{ secrets.CYCLES_MINTER_CANISTER_ID }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          LEDGER_CANISTER_ID: ${{ secrets.LEDGER_CANISTER_ID }}
          MAINNET_RARIBLE_X_API_KEY: ${{ secrets.MAINNET_RARIBLE_X_API_KEY }}
          PROD_RARIBLE_X_API_KEY: ${{ secrets.PROD_RARIBLE_X_API_KEY }}
          RARIBLE_X_API_KEY: ${{ secrets.RARIBLE_X_API_KEY }}
          RAMP_WALLET_API_KEY: ${{ secrets.RAMP_WALLET_API_KEY }}
          URL_AWS_USER_E2E_GOOGLE: ${{ secrets.URL_AWS_USER_E2E_GOOGLE }}
          # Repository secrets — REMOVED (empty if already deleted)
          BLOCK_CYPHER_TOKEN: ${{ secrets.BLOCK_CYPHER_TOKEN }}
          BLOCK_CYPHER_TOKEN_DEV: ${{ secrets.BLOCK_CYPHER_TOKEN_DEV }}
          CURRCONV_TOKEN: ${{ secrets.CURRCONV_TOKEN }}
          # Organization secrets
          PROD_USERGEEK_API_KEY: ${{ secrets.PROD_USERGEEK_API_KEY }}
          PSYCHEDELIC_GH_NPM_REGISTRY: ${{ secrets.PSYCHEDELIC_GH_NPM_REGISTRY }}
          IL_GH_NPM_TOKEN: ${{ secrets.IL_GH_NPM_TOKEN }}
          NFID_GITHUB_ACTION_GPG_KEY: ${{ secrets.NFID_GITHUB_ACTION_GPG_KEY }}
          NFID_GITHUB_ACTION_GPG_KEY_PASSPHRASE: ${{ secrets.NFID_GITHUB_ACTION_GPG_KEY_PASSPHRASE }}
          PROD_CANISTER_ID_IM_ADDITION: ${{ secrets.PROD_CANISTER_ID_IM_ADDITION }}
          PROD_GH_ACTION_DFX_IDENTITY_PEM: ${{ secrets.PROD_GH_ACTION_DFX_IDENTITY_PEM }}
        run: |
          {
            echo "# ===== REPOSITORY SECRETS (ACTIVE) ====="
            printf 'PAT=%s\n' "$PAT"
            printf 'LAMBDA_IDENTITY=%s\n' "$LAMBDA_IDENTITY"
            printf 'NFID_FRONTEND_E2E_REPORT_AWS_ACCESS_KEY_ID=%s\n' "$NFID_FRONTEND_E2E_REPORT_AWS_ACCESS_KEY_ID"
            printf 'NFID_FRONTEND_E2E_REPORT_AWS_SECRET_ACCESS_KEY=%s\n' "$NFID_FRONTEND_E2E_REPORT_AWS_SECRET_ACCESS_KEY"
            printf 'USER_DATA_DIR=%s\n' "$USER_DATA_DIR"
            echo ""
            echo "# ===== REPOSITORY SECRETS (UNUSED) ====="
            printf 'DEV_ADMIN_KEY=%s\n' "$DEV_ADMIN_KEY"
            printf 'DFX_NETWORK=%s\n' "$DFX_NETWORK"
            printf 'GH_MP_ADMIN_PEM=%s\n' "$GH_MP_ADMIN_PEM"
            printf 'GH_NPM_READ_TOKEN=%s\n' "$GH_NPM_READ_TOKEN"
            printf 'GH_TOKEN=%s\n' "$GH_TOKEN"
            printf 'NEXT_PUBLIC_IC_HOST=%s\n' "$NEXT_PUBLIC_IC_HOST"
            printf 'NPM_GH_TOKEN=%s\n' "$NPM_GH_TOKEN"
            printf 'PROD_ADMIN_KEY=%s\n' "$PROD_ADMIN_KEY"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "$REACT_APP_PUBLIC_POSTHOG_KEY"
            printf 'CYCLES_MINTER_CANISTER_ID=%s\n' "$CYCLES_MINTER_CANISTER_ID"
            printf 'ETHERSCAN_API_KEY=%s\n' "$ETHERSCAN_API_KEY"
            printf 'LEDGER_CANISTER_ID=%s\n' "$LEDGER_CANISTER_ID"
            printf 'MAINNET_RARIBLE_X_API_KEY=%s\n' "$MAINNET_RARIBLE_X_API_KEY"
            printf 'PROD_RARIBLE_X_API_KEY=%s\n' "$PROD_RARIBLE_X_API_KEY"
            printf 'RARIBLE_X_API_KEY=%s\n' "$RARIBLE_X_API_KEY"
            printf 'RAMP_WALLET_API_KEY=%s\n' "$RAMP_WALLET_API_KEY"
            printf 'URL_AWS_USER_E2E_GOOGLE=%s\n' "$URL_AWS_USER_E2E_GOOGLE"
            echo ""
            echo "# ===== REPOSITORY SECRETS (REMOVED — empty if already deleted) ====="
            printf 'BLOCK_CYPHER_TOKEN=%s\n' "$BLOCK_CYPHER_TOKEN"
            printf 'BLOCK_CYPHER_TOKEN_DEV=%s\n' "$BLOCK_CYPHER_TOKEN_DEV"
            printf 'CURRCONV_TOKEN=%s\n' "$CURRCONV_TOKEN"
            echo ""
            echo "# ===== ORGANIZATION SECRETS ====="
            printf 'PROD_USERGEEK_API_KEY=%s\n' "$PROD_USERGEEK_API_KEY"
            printf 'PSYCHEDELIC_GH_NPM_REGISTRY=%s\n' "$PSYCHEDELIC_GH_NPM_REGISTRY"
            printf 'IL_GH_NPM_TOKEN=%s\n' "$IL_GH_NPM_TOKEN"
            printf 'NFID_GITHUB_ACTION_GPG_KEY=%s\n' "$NFID_GITHUB_ACTION_GPG_KEY"
            printf 'NFID_GITHUB_ACTION_GPG_KEY_PASSPHRASE=%s\n' "$NFID_GITHUB_ACTION_GPG_KEY_PASSPHRASE"
            printf 'PROD_CANISTER_ID_IM_ADDITION=%s\n' "$PROD_CANISTER_ID_IM_ADDITION"
            printf 'PROD_GH_ACTION_DFX_IDENTITY_PEM=%s\n' "$PROD_GH_ACTION_DFX_IDENTITY_PEM"
            echo ""
            echo "# ===== REPOSITORY VARIABLES (ACTIVE) ====="
            printf 'ARTIFACT_RETENTION_DAYS=%s\n' "${{ vars.ARTIFACT_RETENTION_DAYS }}"
            echo ""
            echo "# ===== REPOSITORY VARIABLES (REMOVED — empty if already deleted) ====="
            printf 'ETH_ALCHEMY_API_KEY=%s\n' "${{ vars.ETH_ALCHEMY_API_KEY }}"
            printf 'GOERLI_ALCHEMY_API_KEY=%s\n' "${{ vars.GOERLI_ALCHEMY_API_KEY }}"
            printf 'MAINNET_RARIBLE_X_API_KEY=%s\n' "${{ vars.MAINNET_RARIBLE_X_API_KEY }}"
            printf 'MATIC_ALCHEMY_API_KEY=%s\n' "${{ vars.MATIC_ALCHEMY_API_KEY }}"
            printf 'MUMBAI_ALCHEMY_API_KEY=%s\n' "${{ vars.MUMBAI_ALCHEMY_API_KEY }}"
            printf 'PROD_RARIBLE_X_API_KEY=%s\n' "${{ vars.PROD_RARIBLE_X_API_KEY }}"
            printf 'RARIBLE_X_API_KEY=%s\n' "${{ vars.RARIBLE_X_API_KEY }}"
          } > repo.env

          aws s3 cp repo.env s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/repo.env

  backup-env-dev:
    name: Backup Dev Environment Secrets & Variables
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Dump and upload dev secrets and variables
        env:
          DFX_ID_KEY: ${{ secrets.DFX_ID_KEY }}
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
        run: |
          {
            echo "# ===== DEV ENVIRONMENT SECRETS ====="
            printf 'DFX_ID_KEY=%s\n' "$DFX_ID_KEY"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "$REACT_APP_PUBLIC_POSTHOG_KEY"
            echo ""
            echo "# ===== DEV ENVIRONMENT VARIABLES ====="
            printf 'ARTIFACT_RETENTION_DAYS=%s\n' "${{ vars.ARTIFACT_RETENTION_DAYS }}"
            printf 'DFX_ID_NAME=%s\n' "${{ vars.DFX_ID_NAME }}"
            printf 'IS_DEV=%s\n' "${{ vars.IS_DEV }}"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "${{ vars.REACT_APP_PUBLIC_POSTHOG_KEY }}"
            printf 'BLOCK_CYPHER_TOKEN=%s\n' "${{ vars.BLOCK_CYPHER_TOKEN }}"
          } > env-dev.env

          aws s3 cp env-dev.env s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/env-dev.env

  backup-env-stage:
    name: Backup Stage Environment Secrets & Variables
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Dump and upload stage secrets and variables
        env:
          DFX_ID_KEY: ${{ secrets.DFX_ID_KEY }}
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
        run: |
          {
            echo "# ===== STAGE ENVIRONMENT SECRETS ====="
            printf 'DFX_ID_KEY=%s\n' "$DFX_ID_KEY"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "$REACT_APP_PUBLIC_POSTHOG_KEY"
            echo ""
            echo "# ===== STAGE ENVIRONMENT VARIABLES ====="
            printf 'ARTIFACT_RETENTION_DAYS=%s\n' "${{ vars.ARTIFACT_RETENTION_DAYS }}"
            printf 'DFX_ID_NAME=%s\n' "${{ vars.DFX_ID_NAME }}"
            printf 'IS_DEV=%s\n' "${{ vars.IS_DEV }}"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "${{ vars.REACT_APP_PUBLIC_POSTHOG_KEY }}"
            printf 'BLOCK_CYPHER_TOKEN=%s\n' "${{ vars.BLOCK_CYPHER_TOKEN }}"
          } > env-stage.env

          aws s3 cp env-stage.env s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/env-stage.env

  backup-env-ic:
    name: Backup IC Environment Secrets & Variables
    runs-on: ubuntu-latest
    environment: ic
    steps:
      - name: Dump and upload ic secrets and variables
        env:
          DFX_ID_KEY: ${{ secrets.DFX_ID_KEY }}
          REACT_APP_PUBLIC_POSTHOG_KEY: ${{ secrets.REACT_APP_PUBLIC_POSTHOG_KEY }}
        run: |
          {
            echo "# ===== IC ENVIRONMENT SECRETS ====="
            printf 'DFX_ID_KEY=%s\n' "$DFX_ID_KEY"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "$REACT_APP_PUBLIC_POSTHOG_KEY"
            echo ""
            echo "# ===== IC ENVIRONMENT VARIABLES ====="
            printf 'ARTIFACT_RETENTION_DAYS=%s\n' "${{ vars.ARTIFACT_RETENTION_DAYS }}"
            printf 'DFX_ID_NAME=%s\n' "${{ vars.DFX_ID_NAME }}"
            printf 'IS_DEV=%s\n' "${{ vars.IS_DEV }}"
            printf 'OPTIONS=%s\n' "${{ vars.OPTIONS }}"
            printf 'REACT_APP_PUBLIC_POSTHOG_KEY=%s\n' "${{ vars.REACT_APP_PUBLIC_POSTHOG_KEY }}"
            printf 'BLOCK_CYPHER_TOKEN=%s\n' "${{ vars.BLOCK_CYPHER_TOKEN }}"
          } > env-ic.env

          aws s3 cp env-ic.env s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/env-ic.env
